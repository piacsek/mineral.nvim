<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="512" viewBox="0 0 1024 512">
  <defs>
    <linearGradient id="gC" x1="0" x2="1">
      <stop offset="0" stop-color="#FF5A6B"/>
      <stop offset="1" stop-color="#FF3B5C"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#0F1316"/>

  <!-- rounded token -->
  <g transform="translate(64,56)">
    <rect width="224" height="224" rx="36" ry="36" fill="#121418"/>
    <!-- gem (two-facet) -->
    <g transform="translate(112,112) scale(0.6)" transform-origin="center">
      <polygon points="0,-120 95,-24 58,98 -58,98 -95,-24" fill="url(#gC)" stroke="#FFD7DE" stroke-width="6" stroke-linejoin="round"/>
      <polygon points="0,-120 58,-24 0,36 -58,-24" fill="#FF9AAD" opacity="0.18"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="320" y="168" fill="#E6EEF8" font-family="JetBrains Mono, monospace" font-size="56">scintilla.nvim</text>
  <text x="320" y="230" fill="#9AA6B1" font-family="Inter, sans-serif" font-size="20">deep gemstone colorschemes for TS + Elixir</text>
</svg>
