<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="gA" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#9B6CFF"/>
      <stop offset="1" stop-color="#6B2BFF"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="100%" height="100%" fill="#0B0F13"/>

  <!-- faceted gem (main) -->
  <g transform="translate(160,140) scale(0.72)">
    <polygon points="384,0 768,256 640,768 512,896 256,896 128,256"
             fill="url(#gA)" stroke="#C9B7FF" stroke-width="12" stroke-linejoin="round"/>
    <!-- inner facets -->
    <path d="M384 0 L512 256 L384 640 L256 256 Z" fill="#9B6CFF" opacity="0.65"/>
    <path d="M512 256 L640 768 L384 640 Z" fill="#6B2BFF" opacity="0.45"/>
  </g>

  <!-- small spark -->
  <g transform="translate(760,180) scale(0.7)">
    <path d="M0 -28 L6 -6 L28 0 L6 6 L0 28 L-6 6 L-28 0 L-6 -6 Z" fill="#FFF7FF" opacity="0.95"/>
  </g>

  <!-- optional small monospaced wordmark -->
  <text x="160" y="920" fill="#E6EEF8" font-family="JetBrains Mono, monospace" font-size="56">scintilla.nvim</text>
</svg>
