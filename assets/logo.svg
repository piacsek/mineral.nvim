<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320"
     font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace">
  <defs>
    <!-- whole gem: dark purple (top) -> light lavender (bottom) -->
    <linearGradient id="gem" gradientUnits="userSpaceOnUse" x1="110" y1="53" x2="110" y2="267">
      <stop offset="0"   stop-color="#4a2d86"/>
      <stop offset="0.5" stop-color="#8b66d4"/>
      <stop offset="1"   stop-color="#ddccff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#af87ff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#af87ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="320" rx="30" fill="#0e0024"/>

  <!-- centered group: gem (w=220) + gap(64) + wordmark(760) = 1044, margins 78 -->
  <g transform="translate(78,0)">
    <circle cx="110" cy="160" r="160" fill="url(#glow)"/>

    <!-- faceted gem, single purple gradient across every facet -->
    <g fill="url(#gem)" stroke="#0e0024" stroke-width="2.6" stroke-linejoin="round">
      <polygon points="60,53 160,53 173,119 47,119"/>
      <polygon points="60,53 47,119 0,119"/>
      <polygon points="160,53 220,119 173,119"/>
      <polygon points="0,119 47,119 110,267"/>
      <polygon points="47,119 173,119 110,267"/>
      <polygon points="173,119 220,119 110,267"/>
    </g>
    <!-- facet sheen -->
    <polyline points="60,53 47,119 110,267" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2"/>
    <polyline points="160,53 173,119 110,267" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="2"/>

    <!-- wordmark (fixed width 760, starts at 284) -->
    <text x="284" y="176" font-size="98" font-weight="700" fill="#f4eeff"
          textLength="760" lengthAdjust="spacing" letter-spacing="-2">scintilla<tspan fill="#af87ff">.nvim</tspan></text>
    <text x="664" y="222" font-size="27" fill="#8676a6" text-anchor="middle"
          textLength="560" lengthAdjust="spacing">DEEP&#160;&#160;GEMSTONE&#160;&#160;COLORSCHEMES</text>
  </g>
</svg>
